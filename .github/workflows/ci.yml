name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest
      - name: Benchmark smoke suite
        run: python scripts/benchmark_smoke_suite.py --output-dir .benchmarks/ci_smoke_suite
      - name: Rust tests
        run: cargo test --manifest-path rust/sssp_accel/Cargo.toml

  rust-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest maturin
      - name: Build and install Rust extension
        run: python scripts/build_rust_extension.py --install-source
      - name: Rust Python integration tests
        run: |
          python -m pytest tests/test_rust_accel.py tests/test_rust_correctness_corpus.py
          python scripts/benchmark_rust_accel.py --nodes 40 --edges 120 --require-rust --output .benchmarks/ci_rust_accel.json
          python scripts/profile_rust_accel.py --nodes 40 --edges 120 --sources 4 --require-rust --output .benchmarks/ci_rust_profile.json
