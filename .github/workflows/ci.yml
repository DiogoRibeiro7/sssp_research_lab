name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest
      - name: Rust tests
        run: cargo test --manifest-path rust/sssp_accel/Cargo.toml

  rust-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest maturin
      - name: Build Rust extension wheel
        working-directory: rust/sssp_accel
        run: python -m maturin build --release
      - name: Install extension into source tree
        run: |
          python scripts/install_built_rust_extension.py rust/sssp_accel/target/wheels/*.whl
      - name: Rust Python integration tests
        run: |
          python -m pytest tests/test_rust_accel.py
          python scripts/benchmark_rust_accel.py --nodes 40 --edges 120 --require-rust --output .benchmarks/ci_rust_accel.json
